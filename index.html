<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feature World: Random Chaos Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Notification System */
        #notification-area {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        
        .notification {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(240, 240, 240, 0.95));
            color: #333;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.3);
            animation: slideDown 0.5s ease-out, fadeOut 0.5s ease-in 2.5s forwards;
            border: 2px solid rgba(255, 255, 255, 0.8);
            text-align: center;
            min-width: 200px;
        }
        
        .notification.speed-up {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            border-color: #ff8787;
        }
        
        .notification.slow-down {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            border-color: #6ee7de;
        }
        
        .notification.invisible {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            color: #333;
            border-color: #d4a5a5;
        }
        
        .notification.giant {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border-color: #ff9a9e;
        }
        
        .notification.tiny {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            border-color: #6ee7de;
        }
        
        .notification.rainbow {
            background: linear-gradient(135deg, #fa709a, #fee140);
            color: white;
            border-color: #ffd93d;
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }
        
        /* D-Pad Controls - Bottom Left */
        #dpad-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 150px;
            height: 150px;
            z-index: 100;
        }
        
        .dpad {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .dpad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            backdrop-filter: blur(5px);
        }
        
        .dpad-btn:active, .dpad-btn.active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
            border-color: rgba(255, 255, 255, 0.8);
        }
        
        .dpad-btn::after {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
        }
        
        .dpad-up {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .dpad-up::after {
            border-width: 0 10px 15px 10px;
            border-color: transparent transparent rgba(255, 255, 255, 0.9) transparent;
        }
        
        .dpad-down {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .dpad-down::after {
            border-width: 15px 10px 0 10px;
            border-color: rgba(255, 255, 255, 0.9) transparent transparent transparent;
        }
        
        .dpad-left {
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .dpad-left::after {
            border-width: 10px 15px 10px 0;
            border-color: transparent rgba(255, 255, 255, 0.9) transparent transparent;
        }
        
        .dpad-right {
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .dpad-right::after {
            border-width: 10px 0 10px 15px;
            border-color: transparent transparent transparent rgba(255, 255, 255, 0.9);
        }
        
        .dpad-center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* Jump Button - Bottom Right */
        #jump-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }
        
        .jump-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: 3px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(238, 90, 90, 0.4);
            transition: all 0.1s;
            backdrop-filter: blur(5px);
        }
        
        .jump-btn:active, .jump-btn.active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(238, 90, 90, 0.6);
            background: linear-gradient(135deg, #ff5252, #d32f2f);
        }
        
        /* Instructions */
        #instructions {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 50;
            pointer-events: none;
        }
        
        /* Effect indicators */
        #effect-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
        }
        
        .effect-badge {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .effect-badge.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="notification-area"></div>
    
    <div id="instructions">
        <div>Use arrow keys or WASD to move</div>
        <div>Space to jump</div>
        <div>Touch controls on mobile</div>
    </div>
    
    <div id="effect-indicator">
        <div class="effect-badge" id="badge-speed">⚡ Speed Boost</div>
        <div class="effect-badge" id="badge-slow">🐌 Slow Motion</div>
        <div class="effect-badge" id="badge-invisible">👻 Invisible</div>
        <div class="effect-badge" id="badge-giant">🦖 Giant Mode</div>
        <div class="effect-badge" id="badge-tiny">🐜 Tiny Mode</div>
        <div class="effect-badge" id="badge-rainbow">🌈 Rainbow Mode</div>
    </div>
    
    <div id="dpad-container">
        <div class="dpad">
            <div class="dpad-btn dpad-up" data-dir="up"></div>
            <div class="dpad-btn dpad-down" data-dir="down"></div>
            <div class="dpad-btn dpad-left" data-dir="left"></div>
            <div class="dpad-btn dpad-right" data-dir="right"></div>
            <div class="dpad-btn dpad-center"></div>
        </div>
    </div>
    
    <div id="jump-container">
        <button class="jump-btn">JUMP</button>
    </div>

    <script>
        // Game State
        const gameState = {
            moveForward: false,
            moveBackward: false,
            moveLeft: false,
            moveRight: false,
            jumping: false,
            speed: 0.15,
            baseSpeed: 0.15,
            jumpSpeed: 0.3,
            gravity: 0.015,
            velocity: new THREE.Vector3(),
            direction: new THREE.Vector3(),
            activeEffects: new Set(),
            isInvisible: false,
            originalScale: 1,
            rainbowMode: false
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(50, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -50;
        directionalLight.shadow.camera.right = 50;
        directionalLight.shadow.camera.top = 50;
        directionalLight.shadow.camera.bottom = -50;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Terrain Generation
        const simplex = new SimplexNoise();
        const terrainSize = 200;
        const terrainSegments = 100;
        
        const terrainGeometry = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegments, terrainSegments);
        terrainGeometry.rotateX(-Math.PI / 2);

        const vertices = terrainGeometry.attributes.position.array;
        for (let i = 0; i < vertices.length; i += 3) {
            const x = vertices[i];
            const z = vertices[i + 2];
            const noise = simplex.noise2D(x * 0.02, z * 0.02);
            vertices[i + 1] = noise * 3; // Height variation
        }
        terrainGeometry.computeVertexNormals();

        const terrainMaterial = new THREE.MeshStandardMaterial({
            color: 0x4a7c59,
            roughness: 0.8,
            metalness: 0.1,
            flatShading: true
        });

        const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
        terrain.receiveShadow = true;
        scene.add(terrain);

        // Character Creation (Green head, brown body)
        const characterGroup = new THREE.Group();

        // Body (Brown)
        const bodyGeometry = new THREE.BoxGeometry(1, 1.5, 0.6);
        const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 0.75;
        body.castShadow = true;
        characterGroup.add(body);

        // Head (Green)
        const headGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const headMaterial = new THREE.MeshStandardMaterial({ color: 0x32CD32 });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        head.position.y = 1.9;
        head.castShadow = true;
        characterGroup.add(head);

        // Eyes
        const eyeGeometry = new THREE.BoxGeometry(0.15, 0.15, 0.1);
        const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        leftEye.position.set(-0.2, 2, 0.4);
        characterGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        rightEye.position.set(0.2, 2, 0.4);
        characterGroup.add(rightEye);

        const pupilGeometry = new THREE.BoxGeometry(0.08, 0.08, 0.05);
        const pupilMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
        leftPupil.position.set(-0.2, 2, 0.45);
        characterGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
        rightPupil.position.set(0.2, 2, 0.45);
        characterGroup.add(rightPupil);

        // Arms
        const armGeometry = new THREE.BoxGeometry(0.3, 1, 0.3);
        const leftArm = new THREE.Mesh(armGeometry, bodyMaterial);
        leftArm.position.set(-0.7, 1, 0);
        leftArm.castShadow = true;
        characterGroup.add(leftArm);

        const rightArm = new THREE.Mesh(armGeometry, bodyMaterial);
        rightArm.position.set(0.7, 1, 0);
        rightArm.castShadow = true;
        characterGroup.add(rightArm);

        // Legs
        const legGeometry = new THREE.BoxGeometry(0.35, 1, 0.4);
        const leftLeg = new THREE.Mesh(legGeometry, bodyMaterial);
        leftLeg.position.set(-0.25, 0.5, 0);
        leftLeg.castShadow = true;
        characterGroup.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeometry, bodyMaterial);
        rightLeg.position.set(0.25, 0.5, 0);
        rightLeg.castShadow = true;
        characterGroup.add(rightLeg);

        scene.add(characterGroup);

        // Clouds
        function createCloud() {
            const cloudGroup = new THREE.Group();
            const cloudMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.8 
            });
            
            const positions = [
                { x: 0, y: 0, z: 0, s: 1 },
                { x: 0.8, y: 0.2, z: 0, s: 0.8 },
                { x: -0.8, y: 0.1, z: 0, s: 0.7 },
                { x: 0.4, y: 0.3, z: 0.4, s: 0.6 },
                { x: -0.4, y: 0.2, z: -0.3, s: 0.5 }
            ];
            
            positions.forEach(pos => {
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(pos.s, 8, 8),
                    cloudMaterial
                );
                sphere.position.set(pos.x, pos.y, pos.z);
                cloudGroup.add(sphere);
            });
            
            return cloudGroup;
        }

        const clouds = [];
        for (let i = 0; i < 15; i++) {
            const cloud = createCloud();
            cloud.position.set(
                (Math.random() - 0.5) * 100,
                15 + Math.random() * 10,
                (Math.random() - 0.5) * 100
            );
            scene.add(cloud);
            clouds.push({ mesh: cloud, speed: 0.02 + Math.random() * 0.03 });
        }

        // Collectible Objects
        const collectibles = [];
        const collectibleTypes = [
            { type: 'speed', color: 0xff0000, geometry: 'box', effect: '⚡ Speed Up!', class: 'speed-up' },
            { type: 'slow', color: 0x00ff00, geometry: 'sphere', effect: '🐌 Slow Down!', class: 'slow-down' },
            { type: 'invisible', color: 0x9400d3, geometry: 'octahedron', effect: '👻 Invisibility!', class: 'invisible' },
            { type: 'giant', color: 0xff1493, geometry: 'torus', effect: '🦖 Giant Mode!', class: 'giant' },
            { type: 'tiny', color: 0x00bfff, geometry: 'cone', effect: '🐜 Tiny Mode!', class: 'tiny' },
            { type: 'rainbow', color: 0xffd700, geometry: 'dodecahedron', effect: '🌈 Rainbow Mode!', class: 'rainbow' }
        ];

        function createCollectible() {
            const typeData = collectibleTypes[Math.floor(Math.random() * collectibleTypes.length)];
            let geometry;
            
            switch(typeData.geometry) {
                case 'box': geometry = new THREE.BoxGeometry(1, 1, 1); break;
                case 'sphere': geometry = new THREE.SphereGeometry(0.6, 16, 16); break;
                case 'octahedron': geometry = new THREE.OctahedronGeometry(0.7); break;
                case 'torus': geometry = new THREE.TorusGeometry(0.5, 0.2, 8, 16); break;
                case 'cone': geometry = new THREE.ConeGeometry(0.5, 1, 8); break;
                case 'dodecahedron': geometry = new THREE.DodecahedronGeometry(0.6); break;
            }
            
            const material = new THREE.MeshStandardMaterial({ 
                color: typeData.color,
                emissive: typeData.color,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.9
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            
            // Random position on terrain
            const x = (Math.random() - 0.5) * 80;
            const z = (Math.random() - 0.5) * 80;
            const y = getTerrainHeight(x, z) + 1.5;
            
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            
            scene.add(mesh);
            
            return {
                mesh: mesh,
                typeData: typeData,
                rotationSpeed: { x: Math.random() * 0.02, y: Math.random() * 0.03 },
                floatOffset: Math.random() * Math.PI * 2
            };
        }

        // Create initial collectibles
        for (let i = 0; i < 20; i++) {
            collectibles.push(createCollectible());
        }

        // Helper function to get terrain height at position
        function getTerrainHeight(x, z) {
            return simplex.noise2D(x * 0.02, z * 0.02) * 3;
        }

        // Notification System
        function showNotification(text, effectClass) {
            const notificationArea = document.getElementById('notification-area');
            const notification = document.createElement('div');
            notification.className = `notification ${effectClass}`;
            notification.textContent = text;
            notificationArea.appendChild(notification);
            
            setTimeout(() => notification.remove(), 3000);
        }

        // Effect Functions
        function applyEffect(typeData) {
            const { type, effect, class: effectClass } = typeData;
            
            showNotification(effect, effectClass);
            
            // Update badge
            const badgeId = `badge-${type}`;
            const badge = document.getElementById(badgeId);
            if (badge) {
                badge.classList.add('active');
                setTimeout(() => badge.classList.remove('active'), 5000);
            }
            
            switch(type) {
                case 'speed':
                    gameState.speed = gameState.baseSpeed * 3;
                    setTimeout(() => { gameState.speed = gameState.baseSpeed; }, 5000);
                    break;
                    
                case 'slow':
                    gameState.speed = gameState.baseSpeed * 0.3;
                    setTimeout(() => { gameState.speed = gameState.baseSpeed; }, 5000);
                    break;
                    
                case 'invisible':
                    gameState.isInvisible = true;
                    characterGroup.traverse(child => {
                        if (child.isMesh) {
                            child.material.transparent = true;
                            child.material.opacity = 0.3;
                        }
                    });
                    setTimeout(() => {
                        gameState.isInvisible = false;
                        characterGroup.traverse(child => {
                            if (child.isMesh) {
                                child.material.transparent = false;
                                child.material.opacity = 1;
                            }
                        });
                    }, 5000);
                    break;
                    
                case 'giant':
                    gameState.originalScale = characterGroup.scale.x;
                    characterGroup.scale.set(3, 3, 3);
                    setTimeout(() => {
                        characterGroup.scale.set(gameState.originalScale, gameState.originalScale, gameState.originalScale);
                    }, 5000);
                    break;
                    
                case 'tiny':
                    gameState.originalScale = characterGroup.scale.x;
                    characterGroup.scale.set(0.3, 0.3, 0.3);
                    setTimeout(() => {
                        characterGroup.scale.set(gameState.originalScale, gameState.originalScale, gameState.originalScale);
                    }, 5000);
                    break;
                    
                case 'rainbow':
                    gameState.rainbowMode = true;
                    setTimeout(() => {
                        gameState.rainbowMode = false;
                        // Reset colors
                        characterGroup.children[0].material.color.setHex(0x8B4513); // body
                        characterGroup.children[1].material.color.setHex(0x32CD32); // head
                    }, 5000);
                    break;
            }
        }

        // Input Handling
        const keys = {};
        
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            updateMovementState();
            if (e.code === 'Space') jump();
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            updateMovementState();
        });

        function updateMovementState() {
            gameState.moveForward = keys['ArrowUp'] || keys['KeyW'];
            gameState.moveBackward = keys['ArrowDown'] || keys['KeyS'];
            gameState.moveLeft = keys['ArrowLeft'] || keys['KeyA'];
            gameState.moveRight = keys['ArrowRight'] || keys['KeyD'];
        }

        function jump() {
            if (!gameState.jumping) {
                gameState.jumping = true;
                gameState.velocity.y = gameState.jumpSpeed;
            }
        }

        // Touch Controls
        const dpadBtns = document.querySelectorAll('.dpad-btn[data-dir]');
        const jumpBtn = document.querySelector('.jump-btn');

        dpadBtns.forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                const dir = btn.dataset.dir;
                switch(dir) {
                    case 'up': gameState.moveForward = true; break;
                    case 'down': gameState.moveBackward = true; break;
                    case 'left': gameState.moveLeft = true; break;
                    case 'right': gameState.moveRight = true; break;
                }
            });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active');
                const dir = btn.dataset.dir;
                switch(dir) {
                    case 'up': gameState.moveForward = false; break;
                    case 'down': gameState.moveBackward = false; break;
                    case 'left': gameState.moveLeft = false; break;
                    case 'right': gameState.moveRight = false; break;
                }
            });
            
            // Mouse fallback for desktop testing
            btn.addEventListener('mousedown', (e) => {
                btn.classList.add('active');
                const dir = btn.dataset.dir;
                switch(dir) {
                    case 'up': gameState.moveForward = true; break;
                    case 'down': gameState.moveBackward = true; break;
                    case 'left': gameState.moveLeft = true; break;
                    case 'right': gameState.moveRight = true; break;
                }
            });
            
            btn.addEventListener('mouseup', () => {
                btn.classList.remove('active');
                const dir = btn.dataset.dir;
                switch(dir) {
                    case 'up': gameState.moveForward = false; break;
                    case 'down': gameState.moveBackward = false; break;
                    case 'left': gameState.moveLeft = false; break;
                    case 'right': gameState.moveRight = false; break;
                }
            });
            
            btn.addEventListener('mouseleave', () => {
                btn.classList.remove('active');
                const dir = btn.dataset.dir;
                switch(dir) {
                    case 'up': gameState.moveForward = false; break;
                    case 'down': gameState.moveBackward = false; break;
                    case 'left': gameState.moveLeft = false; break;
                    case 'right': gameState.moveRight = false; break;
                }
            });
        });

        jumpBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jumpBtn.classList.add('active');
            jump();
        });
        
        jumpBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            jumpBtn.classList.remove('active');
        });
        
        jumpBtn.addEventListener('mousedown', () => {
            jumpBtn.classList.add('active');
            jump();
        });
        
        jumpBtn.addEventListener('mouseup', () => {
            jumpBtn.classList.remove('active');
        });

        // Animation Loop
        let time = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            time += delta;

            // Character Movement
            gameState.direction.set(0, 0, 0);
            
            if (gameState.moveForward) gameState.direction.z -= 1;
            if (gameState.moveBackward) gameState.direction.z += 1;
            if (gameState.moveLeft) gameState.direction.x -= 1;
            if (gameState.moveRight) gameState.direction.x += 1;
            
            gameState.direction.normalize();
            
            // Apply movement relative to camera
            if (gameState.direction.length() > 0) {
                const cameraDirection = new THREE.Vector3();
                camera.getWorldDirection(cameraDirection);
                cameraDirection.y = 0;
                cameraDirection.normalize();
                
                const cameraRight = new THREE.Vector3();
                cameraRight.crossVectors(cameraDirection, new THREE.Vector3(0, 1, 0));
                
                const moveVector = new THREE.Vector3()
                    .addScaledVector(cameraDirection, -gameState.direction.z)
                    .addScaledVector(cameraRight, gameState.direction.x);
                
                moveVector.normalize().multiplyScalar(gameState.speed);
                
                characterGroup.position.x += moveVector.x;
                characterGroup.position.z += moveVector.z;
                
                // Rotate character to face movement direction
                const targetRotation = Math.atan2(moveVector.x, moveVector.z);
                characterGroup.rotation.y = targetRotation;
                
                // Walking animation
                const walkCycle = Math.sin(time * 10) * 0.3;
                characterGroup.children[2].rotation.x = walkCycle; // left arm
                characterGroup.children[3].rotation.x = -walkCycle; // right arm
                characterGroup.children[4].rotation.x = -walkCycle; // left leg
                characterGroup.children[5].rotation.x = walkCycle; // right leg
            } else {
                // Reset limb positions
                characterGroup.children[2].rotation.x = 0;
                characterGroup.children[3].rotation.x = 0;
                characterGroup.children[4].rotation.x = 0;
                characterGroup.children[5].rotation.x = 0;
            }

            // Apply gravity and jumping
            gameState.velocity.y -= gameState.gravity;
            characterGroup.position.y += gameState.velocity.y;
            
            // Terrain collision
            const terrainHeight = getTerrainHeight(characterGroup.position.x, characterGroup.position.z);
            const characterHeight = gameState.jumping ? 0 : 0;
            
            if (characterGroup.position.y < terrainHeight + 1) {
                characterGroup.position.y = terrainHeight + 1;
                gameState.velocity.y = 0;
                gameState.jumping = false;
            }

            // Camera follow
            const cameraOffset = new THREE.Vector3(0, 5, 10);
            const targetPosition = characterGroup.position.clone().add(cameraOffset);
            camera.position.lerp(targetPosition, 0.1);
            camera.lookAt(characterGroup.position);

            // Animate clouds
            clouds.forEach(cloud => {
                cloud.mesh.position.x += cloud.speed;
                if (cloud.mesh.position.x > 50) {
                    cloud.mesh.position.x = -50;
                }
            });

            // Animate collectibles and check collisions
            collectibles.forEach((item, index) => {
                // Float animation
                item.mesh.position.y += Math.sin(time + item.floatOffset) * 0.01;
                item.mesh.rotation.x += item.rotationSpeed.x;
                item.mesh.rotation.y += item.rotationSpeed.y;
                
                // Collision detection
                const distance = characterGroup.position.distanceTo(item.mesh.position);
                if (distance < 2) {
                    // Apply effect
                    applyEffect(item.typeData);
                    
                    // Remove and respawn
                    scene.remove(item.mesh);
                    collectibles.splice(index, 1);
                    setTimeout(() => {
                        collectibles.push(createCollectible());
                    }, 3000);
                }
            });

            // Rainbow mode effect
            if (gameState.rainbowMode) {
                const hue = (time * 2) % 1;
                const color = new THREE.Color().setHSL(hue, 1, 0.5);
                characterGroup.children[0].material.color.copy(color);
                characterGroup.children[1].material.color.copy(color);
            }

            // Random notification
            if (Math.random() < 0.001) {
                const messages = [
                    { text: "🎲 Chaos reigns!", class: "rainbow" },
                    { text: "✨ Keep exploring!", class: "speed-up" },
                    { text: "🎮 Touch the shapes!", class: "invisible" },
                    { text: "🌟 Randomness awaits!", class: "giant" }
                ];
                const msg = messages[Math.floor(Math.random() * messages.length)];
                showNotification(msg.text, msg.class);
            }

            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation
        animate();

        // Welcome notification
        setTimeout(() => {
            showNotification("🎮 Welcome to Feature World!", "rainbow");
        }, 1000);
    </script>
</body>
</html>
